name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt-version: '5.15.2'
          - os: ubuntu-latest
            qt-version: '6.8.0'
          - os: windows-latest
            qt-version: '5.15.2'
          - os: windows-latest
            qt-version: '6.8.0'
          - os: macos-latest
            qt-version: '6.9.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          cache: true

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release -DQTDRAGGRID_BUILD_DEMO=OFF"
          if [ "${{ runner.os }}" = "macOS" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0"
          fi
          cmake -S . -B build $CMAKE_ARGS

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release

      - name: Install (Unix)
        if: runner.os != 'Windows'
        run: cmake --install build --prefix build/install

      - name: Configure installed consumer (Unix)
        if: runner.os != 'Windows'
        run: cmake -S tests/consumer -B build/consumer -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ github.workspace }}/build/install"

      - name: Build installed consumer (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build/consumer --config Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DQTDRAGGRID_BUILD_DEMO=OFF

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Install (Windows)
        if: runner.os == 'Windows'
        run: cmake --install build --prefix build/install --config Release

      - name: Configure installed consumer (Windows)
        if: runner.os == 'Windows'
        run: cmake -S tests/consumer -B build/consumer -DCMAKE_PREFIX_PATH="${{ github.workspace }}/build/install"

      - name: Build installed consumer (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build/consumer --config Release

      - name: Test (Unix)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure -C Release

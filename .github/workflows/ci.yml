name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        qt-version: ['5.15.2', '6.8.0']
        exclude:
          # Qt 5.15.2 does not provide arm64 macOS binaries, and the Intel runner
          # (macos-13) is often heavily queued. Test macOS only with Qt 6.
          - os: macos-latest
            qt-version: '5.15.2'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          cache: true

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release"
          if [ "${{ runner.os }}" = "macOS" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0"
          fi
          cmake -S . -B build $CMAKE_ARGS

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Test (Unix)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure -C Release
